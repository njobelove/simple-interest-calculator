<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator-card">
            <h1>Simple Interest Calculator</h1>
            <p class="subtitle">Calculate interest on your principal amount</p>
            
            <form id="interestForm">
                <div class="input-group">
                    <label for="principal">Principal Amount ($)</label>
                    <input type="number" id="principal" name="principal" step="any" required placeholder="Enter principal amount">
                </div>

                <div class="input-group">
                    <label for="rate">Rate of Interest (%)</label>
                    <input type="number" id="rate" name="rate" step="any" required placeholder="Enter interest rate">
                </div>

                <div class="input-group">
                    <label for="time">Time Period (Years)</label>
                    <input type="number" id="time" name="time" step="any" required placeholder="Enter time in years">
                </div>

                <button type="submit" class="calculate-btn">Calculate Interest</button>
            </form>

            <div id="result" class="result hidden">
                <h3>Calculation Results</h3>
                <div class="result-details">
                    <p><strong>Principal:</strong> $<span id="displayPrincipal">0</span></p>
                    <p><strong>Rate:</strong> <span id="displayRate">0</span>%</p>
                    <p><strong>Time:</strong> <span id="displayTime">0</span> years</p>
                    <div class="highlight">
                        <p><strong>Simple Interest:</strong> $<span id="simpleInterest">0</span></p>
                        <p><strong>Total Amount:</strong> $<span id="totalAmount">0</span></p>
                    </div>
                </div>
                <button type="button" class="reset-btn" onclick="resetForm()">Clear All</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
